# docker-compose.yml — MariaDB databáza pre Tiperliga (vývoj)
# Spustenie:  docker compose up -d
# Zastavenie: docker compose down
# Zmazanie aj dát: docker compose down -v

services:
  db:
    image: mariadb:10.11               # MariaDB 10.11 (LTS)
    container_name: tiperliga-db
    restart: unless-stopped
    environment:
      MARIADB_USER: tiperliga          # Musí sa zhodovať s DB_USER v backend/.env
      MARIADB_PASSWORD: tiperliga_dev  # Musí sa zhodovať s DB_PASSWORD v backend/.env
      MARIADB_DATABASE: tiperliga      # Musí sa zhodovať s DB_NAME v backend/.env
      MARIADB_ROOT_PASSWORD: root_dev  # Heslo pre root (len lokálny vývoj)
    ports:
      - "3306:3306"                    # Mapovanie portu DB na localhost:3306
    volumes:
      - tiperliga_mariadata:/var/lib/mysql   # Trvalé uloženie dát mimo kontajnera
    healthcheck:                       # Overenie, či je DB pripravená
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Webové rozhranie na prezeranie databázy (http://localhost:8080)
  adminer:
    image: adminer:latest
    container_name: tiperliga-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  tiperliga_mariadata:                 # Pomenovaný volume, kde žijú dáta DB
